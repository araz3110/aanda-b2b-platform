<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - A&A Global B2B Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#C9A84C;
  --dark:#0A0A0A;
  --card:#111;
  --line:#252525;
  --white:#F8F5EF;
  --muted:#8A8A8A;
  --red:#b84a4a;
  --green:#4aa36f;
}

body{
  background:var(--dark);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  min-height:100vh;
}

header{
  padding:22px 30px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#080808;
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;
}

.logo span{color:var(--gold);}

.wrapper{
  padding:28px;
}

button{
  padding:9px 12px;
  border:none;
  cursor:pointer;
  margin:4px 4px 4px 0;
  background:var(--gold);
  color:#000;
  font-weight:600;
}

.btn-red{
  background:var(--red);
  color:white;
}

.btn-green{
  background:var(--green);
  color:white;
}

.btn-dark{
  background:#222;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:25px;
}

.stat{
  background:var(--card);
  border:1px solid var(--line);
  padding:18px;
}

.stat h3{
  font-size:14px;
  color:var(--muted);
  margin-bottom:8px;
}

.stat strong{
  font-size:28px;
  color:var(--gold);
}

.section{
  margin-top:28px;
}

.section h2{
  font-size:20px;
  margin-bottom:14px;
  color:var(--gold);
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:18px;
  margin-bottom:12px;
}

.card h3{
  margin-bottom:8px;
  color:white;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  color:#ddd;
  font-size:14px;
}

.label{
  color:var(--muted);
}

.badge{
  display:inline-block;
  padding:4px 8px;
  margin:4px 4px 8px 0;
  font-size:12px;
  border:1px solid var(--gold);
  color:var(--gold);
}

.badge-red{
  border-color:var(--red);
  color:var(--red);
}

.badge-green{
  border-color:var(--green);
  color:var(--green);
}

.empty{
  color:var(--muted);
  padding:15px;
  border:1px dashed #333;
}

.description{
  margin-top:10px;
  color:#bbb;
  font-size:14px;
  line-height:1.5;
}

.actions{
  margin-top:12px;
}

@media(max-width:800px){
  .grid{grid-template-columns:1fr 1fr;}
  .row{grid-template-columns:1fr;}
}

@media(max-width:500px){
  header{padding:18px;}
  .wrapper{padding:18px;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="logo">A<span>&</span>A Admin</div>
  <button onclick="logout()" class="btn-dark">Logout</button>
</header>

<div class="wrapper">

  <div class="grid">
    <div class="stat">
      <h3>Pending</h3>
      <strong id="pendingCount">0</strong>
    </div>

    <div class="stat">
      <h3>Approved</h3>
      <strong id="approvedCount">0</strong>
    </div>

    <div class="stat">
      <h3>Premium</h3>
      <strong id="premiumCount">0</strong>
    </div>

    <div class="stat">
      <h3>Verified</h3>
      <strong id="verifiedCount">0</strong>
    </div>
  </div>

  <div class="section">
    <h2>Pending Applications</h2>
    <div id="pendingList"></div>
  </div>

  <div class="section">
    <h2>Approved Companies</h2>
    <div id="approvedList"></div>
  </div>

  <div class="section">
    <h2>Rejected / Suspended Companies</h2>
    <div id="rejectedList"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj1JKJIk9CvIIgwowusAMfDdDi5L9NY4k",
  authDomain: "aanda-web.firebaseapp.com",
  projectId: "aanda-web",
  storageBucket: "aanda-web.firebasestorage.app",
  messagingSenderId: "454700153826",
  appId: "1:454700153826:web:793107ea88e01d6eee97bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ADMIN EMAIL */
const ADMIN_EMAIL = "aanda.b2bplatform@gmail.com";

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    alert("Access denied. This page is only for admin.");
    window.location.href = "dashboard.html";
    return;
  }

  loadCompanies();
});

function safe(value){
  if(value === undefined || value === null || value === ""){
    return "-";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function loadCompanies(){
  const pendingList = document.getElementById("pendingList");
  const approvedList = document.getElementById("approvedList");
  const rejectedList = document.getElementById("rejectedList");

  onSnapshot(collection(db, "companies"), (snapshot) => {
    pendingList.innerHTML = "";
    approvedList.innerHTML = "";
    rejectedList.innerHTML = "";

    let pendingCount = 0;
    let approvedCount = 0;
    let premiumCount = 0;
    let verifiedCount = 0;

    snapshot.forEach((docItem) => {
      const data = docItem.data();
      const id = docItem.id;

      if (data.premium) premiumCount++;
      if (data.verified) verifiedCount++;

      const card = createCompanyCard(id, data);

      if (data.status === "pending") {
        pendingCount++;
        pendingList.innerHTML += card;
      } 
      else if (data.status === "approved") {
        approvedCount++;
        approvedList.innerHTML += card;
      } 
      else {
        rejectedList.innerHTML += card;
      }
    });

    document.getElementById("pendingCount").innerText = pendingCount;
    document.getElementById("approvedCount").innerText = approvedCount;
    document.getElementById("premiumCount").innerText = premiumCount;
    document.getElementById("verifiedCount").innerText = verifiedCount;

    if (!pendingList.innerHTML) {
      pendingList.innerHTML = `<div class="empty">No pending applications.</div>`;
    }

    if (!approvedList.innerHTML) {
      approvedList.innerHTML = `<div class="empty">No approved companies.</div>`;
    }

    if (!rejectedList.innerHTML) {
      rejectedList.innerHTML = `<div class="empty">No rejected or suspended companies.</div>`;
    }
  });
}

function createCompanyCard(id, data){

  const premiumBadge = data.premium 
    ? `<span class="badge">Premium</span>` 
    : "";

  const verifiedBadge = data.verified 
    ? `<span class="badge badge-green">Verified</span>` 
    : "";

  const suspendedBadge = data.suspended 
    ? `<span class="badge badge-red">Suspended</span>` 
    : "";

  return `
    <div class="card">
      <h3>${safe(data.company)}</h3>

      ${premiumBadge}
      ${verifiedBadge}
      ${suspendedBadge}

      <div class="row">
        <div><span class="label">Email:</span> ${safe(data.email)}</div>
        <div><span class="label">Country:</span> ${safe(data.country)}</div>
        <div><span class="label">Role:</span> ${safe(data.role)}</div>
        <div><span class="label">Room:</span> ${safe(data.room)}</div>
        <div><span class="label">WhatsApp:</span> ${safe(data.whatsapp)}</div>
        <div><span class="label">Website:</span> ${safe(data.website)}</div>
        <div><span class="label">Capacity:</span> ${safe(data.capacity)}</div>
        <div><span class="label">Status:</span> ${safe(data.status)}</div>
      </div>

      <div class="description">
        ${safe(data.description)}
      </div>

      <div class="actions">
        <button class="btn-green" onclick="approveCompany('${id}')">Approve</button>
        <button class="btn-red" onclick="rejectCompany('${id}')">Reject</button>

        <button onclick="makePremium('${id}', ${data.premium ? "false" : "true"})">
          ${data.premium ? "Remove Premium" : "Make Premium"}
        </button>

        <button onclick="makeVerified('${id}', ${data.verified ? "false" : "true"})">
          ${data.verified ? "Remove Verified" : "Make Verified"}
        </button>

        <button class="btn-dark" onclick="suspendCompany('${id}', ${data.suspended ? "false" : "true"})">
          ${data.suspended ? "Unsuspend" : "Suspend"}
        </button>
      </div>
    </div>
  `;
}

window.approveCompany = async function(id){
  await updateDoc(doc(db, "companies", id), {
    status: "approved",
    suspended: false,
    updatedAt: new Date()
  });
};

window.rejectCompany = async function(id){
  await updateDoc(doc(db, "companies", id), {
    status: "rejected",
    updatedAt: new Date()
  });
};

window.makePremium = async function(id, value){
  await updateDoc(doc(db, "companies", id), {
    premium: value,
    updatedAt: new Date()
  });
};

window.makeVerified = async function(id, value){
  await updateDoc(doc(db, "companies", id), {
    verified: value,
    updatedAt: new Date()
  });
};

window.suspendCompany = async function(id, value){
  await updateDoc(doc(db, "companies", id), {
    suspended: value,
    status: value ? "suspended" : "approved",
    updatedAt: new Date()
  });
};

window.logout = function(){
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

</script>

</body>
</html>
