<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  background:#0A0A0A;
  color:white;
  font-family:Montserrat;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:400px;
  background:#111;
  padding:30px;
  border:1px solid #C9A84C;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#000;
  border:1px solid #333;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:#C9A84C;
  border:none;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>Company Verification</h2>

  <input id="companyName" placeholder="Company Name">
  <input id="sector" placeholder="Business Sector">
  <input id="country" placeholder="Country">
  <input id="phone" placeholder="Phone Number">
  <input id="taxNumber" placeholder="Tax Number">

  <button onclick="saveProfile()">Submit for Approval</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj1JKJIk9CvIIgwowusAMfDdDi5L9NY4k",
  authDomain: "aanda-web.firebaseapp.com",
  projectId: "aanda-web",
  storageBucket: "aanda-web.firebasestorage.app",
  messagingSenderId: "454700153826",
  appId: "1:454700153826:web:793107ea88e01d6eee97bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SAVE PROFILE
window.saveProfile = async function(){

  const user = auth.currentUser;

  if(!user){
    alert("Giriş yapman gerekiyor");
    return;
  }

  const data = {
    email: user.email,
    companyName: document.getElementById("companyName").value,
    sector: document.getElementById("sector").value,
    country: document.getElementById("country").value,
    phone: document.getElementById("phone").value,
    taxNumber: document.getElementById("taxNumber").value,
    status: "pending",
    createdAt: new Date()
  };

  await setDoc(doc(db, "companies", user.uid), data);

  alert("Başvurun alındı. Onay bekleniyor.");
};

</script>

</body>
</html>
