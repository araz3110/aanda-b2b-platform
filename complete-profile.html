<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Your Profile</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet"><style>
body{
  background:#0A0A0A;
  color:white;
  font-family:'Montserrat',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.box{
  background:#111;
  padding:30px;
  width:340px;
  border:1px solid #333;
}
input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#000;
  border:1px solid #222;
  color:white;
}
button{
  width:100%;
  padding:12px;
  background:#C9A84C;
  border:none;
  margin-top:10px;
  cursor:pointer;
}
small{color:#888;}
</style></head><body><div class="box">
  <h2>Complete Your Profile</h2>  <input id="company" placeholder="Company Name">
  <input id="country" placeholder="Country">  <!-- 🔥 ROLE EKLEDİK -->  <select id="role">
    <option value="">Select Role</option>
    <option value="producer">Producer</option>
    <option value="buyer">Buyer</option>
    <option value="exporter">Exporter</option>
    <option value="importer">Importer</option>
  </select>  <select id="room">
    <option value="">Select Industry</option>
    <option value="rice">Rice</option>
    <option value="wheat">Wheat</option>
    <option value="oil">Oil</option>
    <option value="sugar">Sugar</option>
    <option value="coffee">Coffee</option>
  </select><small>Your account will be reviewed after submission</small>

<button onclick="saveProfile()">Submit for Approval</button>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "aanda-web.firebaseapp.com",
  projectId: "aanda-web"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.saveProfile = async function () {

  const user = auth.currentUser;

  if (!user) {
    alert("Please login again");
    return;
  }

  const company = document.getElementById("company").value;
  const country = document.getElementById("country").value;
  const role = document.getElementById("role").value;
  const room = document.getElementById("room").value;

  if(!company || !country || !role || !room){
    alert("Please fill all fields");
    return;
  }

  try{

    // 🔥 BURASI KRİTİK (OLUŞTURUYOR)
    await setDoc(doc(db, "companies", user.uid), {
      email: user.email,
      company,
      country,
      role,
      room,
      status: "pending",
      premium: false,
      createdAt: new Date()
    });

    alert("Application submitted");
    window.location.href = "index.html";

  }catch(err){
    alert("Error: " + err.message);
  }
};

</script></body>
</html>
