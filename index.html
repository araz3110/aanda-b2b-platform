<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&A Global B2B Platform</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C9A84C;
  --dark:#0A0A0A;
  --white:#F8F5EF;
}
body{
  background:var(--dark);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
}
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.login-box{
  margin-top:40px;
  background:rgba(0,0,0,0.6);
  padding:30px;
  border:1px solid rgba(201,168,76,0.2);
  width:300px;
}
input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#111;
  border:1px solid #222;
  color:white;
}
.login-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.btn-login{
  background:var(--gold);
  border:none;
  padding:12px;
}
.btn-register{
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold);
  padding:12px;
}
</style></head><body><section class="hero">
  <div>
    <h1>A&A Global Trade Platform</h1><div class="login-box">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <!-- ROLE SELECTION -->
  <select id="role">
    <option value="">Select Role</option>
    <option value="producer">Producer</option>
    <option value="buyer">Buyer</option>
    <option value="exporter">Exporter</option>
    <option value="importer">Importer</option>
  </select>

  <div class="login-buttons">
    <button class="btn-register" onclick="register()">Register</button>
    <button class="btn-login" onclick="login()">Login</button>
  </div>
</div>

  </div>
</section><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj1JKJIk9CvIIgwowusAMfDdDi5L9NY4k",
  authDomain: "aanda-web.firebaseapp.com",
  projectId: "aanda-web",
  storageBucket: "aanda-web.firebasestorage.app",
  messagingSenderId: "454700153826",
  appId: "1:454700153826:web:793107ea88e01d6eee97bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

//////////////////////////
// REGISTER
//////////////////////////
window.register = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  if(!email || !password || !role){
    alert("Please fill all fields");
    return;
  }

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // Save basic info (room will be selected later)
    await setDoc(doc(db, "companies", user.uid), {
      email,
      role,
      status: "incomplete",
      createdAt: new Date()
    });

    await sendEmailVerification(user);

    alert("Registration received. Please verify your email.");

  }catch(err){
    alert(err.message);
  }
};

//////////////////////////
// LOGIN
//////////////////////////
window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    if (!user.emailVerified) {
      alert("Please verify your email");
      return;
    }

    const docRef = doc(db, "companies", user.uid);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
      window.location.href = "complete-profile.html";
      return;
    }

    const data = docSnap.data();

    if (data.status === "incomplete") {
      window.location.href = "complete-profile.html";
      return;
    }

    if (data.status === "pending") {
      alert("Your account is pending approval");
      return;
    }

    if (data.status === "rejected") {
      alert("Your account was rejected");
      return;
    }

    if (data.status === "approved") {
      window.location.href = "dashboard.html";
    }

  }catch(err){
    alert("Error: " + err.message);
  }
};

</script></body>
</html>
