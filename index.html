<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&A Global B2B Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#C9A84C;
  --dark:#0A0A0A;
  --white:#F8F5EF;
  --muted:#8A8A8A;
}

body{
  background:var(--dark);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
}

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(120deg,#050505,#0A0A0A,#111);
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:3rem;
  margin-bottom:8px;
}

.logo span{
  color:var(--gold);
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:2.4rem;
  font-weight:400;
  margin-bottom:10px;
}

.subtitle{
  color:var(--muted);
  font-size:14px;
  max-width:420px;
  margin:auto;
  line-height:1.6;
}

.login-box{
  margin:35px auto 0;
  background:rgba(0,0,0,0.65);
  padding:30px;
  border:1px solid rgba(201,168,76,0.25);
  width:100%;
  max-width:340px;
}

input, select{
  width:100%;
  padding:13px;
  margin:7px 0;
  background:#111;
  border:1px solid #222;
  color:white;
  font-family:'Montserrat',sans-serif;
}

.login-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:8px;
}

button{
  cursor:pointer;
  font-weight:600;
}

.btn-login{
  background:var(--gold);
  border:none;
  padding:13px;
  color:#000;
}

.btn-register{
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold);
  padding:13px;
}

.note{
  color:var(--muted);
  font-size:12px;
  margin-top:14px;
  line-height:1.5;
}

@media(max-width:500px){
  h1{font-size:2rem;}
  .logo{font-size:2.5rem;}
}
</style>
</head>

<body>

<section class="hero">
  <div>

    <div class="logo">A<span>&</span>A</div>

    <h1>Global B2B Trade Platform</h1>

    <p class="subtitle">
      Connect with verified producers, buyers, exporters and importers through controlled industry-based trade rooms.
    </p>

    <div class="login-box">

      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">

      <select id="role">
        <option value="">Select Role</option>
        <option value="producer">Producer</option>
        <option value="buyer">Buyer</option>
        <option value="exporter">Exporter</option>
        <option value="importer">Importer</option>
      </select>

      <div class="login-buttons">
        <button class="btn-register" onclick="register()">Register</button>
        <button class="btn-login" onclick="login()">Login</button>
      </div>

      <div class="note">
        Select a role only when registering. Existing members can login with email and password.
      </div>

    </div>

  </div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj1JKJIk9CvIIgwowusAMfDdDi5L9NY4k",
  authDomain: "aanda-web.firebaseapp.com",
  projectId: "aanda-web",
  storageBucket: "aanda-web.firebasestorage.app",
  messagingSenderId: "454700153826",
  appId: "1:454700153826:web:793107ea88e01d6eee97bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "aanda.b2bplatform@gmail.com";

/* REGISTER */
window.register = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("role").value;

  if(!email || !password || !role){
    alert("Please fill email, password and role");
    return;
  }

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db, "companies", user.uid), {
      email: email,
      role: role,
      status: "incomplete",
      premium: false,
      verified: false,
      suspended: false,
      createdAt: new Date()
    });

    await sendEmailVerification(user);

    alert("Registration received. Please verify your email.");

  }catch(err){
    alert("Error: " + err.message);
  }
};

/* LOGIN */
window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Please enter email and password");
    return;
  }

  try{
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    if (!user.emailVerified) {
      alert("Please verify your email");
      return;
    }

    /* Admin direct access */
    if (user.email === ADMIN_EMAIL) {
      window.location.href = "admin.html";
      return;
    }

    const docRef = doc(db, "companies", user.uid);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
      window.location.href = "complete-profile.html";
      return;
    }

    const data = docSnap.data();

    if (data.status === "incomplete") {
      window.location.href = "complete-profile.html";
      return;
    }

    if (data.status === "pending") {
      alert("Your account is pending approval");
      return;
    }

    if (data.status === "rejected") {
      alert("Your account was rejected");
      return;
    }

    if (data.status === "suspended" || data.suspended === true) {
      alert("Your account is suspended");
      return;
    }

    if (data.status === "approved") {
      window.location.href = "dashboard.html";
      return;
    }

    alert("Account status is not valid. Please contact admin.");

  }catch(err){
    alert("Error: " + err.message);
  }
};

</script>

</body>
</html>
