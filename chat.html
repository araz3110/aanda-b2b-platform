<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Deal Chat - A&A Global B2B Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#C9A84C;
  --dark:#0A0A0A;
  --card:#111;
  --line:#252525;
  --white:#F8F5EF;
  --muted:#8A8A8A;
  --green:#4aa36f;
  --red:#b84a4a;
}

body{
  background:var(--dark);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  min-height:100vh;
}

header{
  padding:22px 30px;
  border-bottom:1px solid var(--line);
  background:#080808;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:20;
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;
}

.logo span{
  color:var(--gold);
}

.header-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.wrapper{
  max-width:900px;
  margin:auto;
  padding:28px;
}

.deal-box{
  background:
    linear-gradient(120deg,#111,#050505),
    radial-gradient(circle at top right,rgba(201,168,76,0.16),transparent 35%);
  border:1px solid rgba(201,168,76,0.25);
  padding:22px;
  margin-bottom:20px;
}

.deal-box h2{
  margin-bottom:8px;
  font-weight:500;
  color:var(--white);
}

.small{
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
}

.chat-box{
  background:var(--card);
  border:1px solid var(--line);
  padding:18px;
  min-height:380px;
  max-height:520px;
  overflow-y:auto;
  margin-bottom:15px;
}

.message{
  padding:12px;
  margin-bottom:10px;
  background:#0b0b0b;
  border:1px solid #222;
  max-width:80%;
}

.mine{
  margin-left:auto;
  border-color:var(--gold);
}

.partner{
  margin-right:auto;
}

.message-text{
  line-height:1.5;
  white-space:pre-wrap;
}

.message-meta{
  margin-top:7px;
  font-size:11px;
  color:var(--muted);
  line-height:1.4;
}

.input-box{
  background:var(--card);
  border:1px solid var(--line);
  padding:15px;
  display:none;
}

textarea{
  width:100%;
  min-height:90px;
  resize:vertical;
  padding:12px;
  background:#000;
  border:1px solid #222;
  color:white;
  font-family:'Montserrat',sans-serif;
}

textarea:focus{
  outline:none;
  border-color:var(--gold);
}

button{
  padding:10px 14px;
  background:var(--gold);
  color:#000;
  border:none;
  cursor:pointer;
  font-weight:600;
  margin-top:8px;
  font-family:'Montserrat',sans-serif;
}

button:hover{
  opacity:0.9;
}

button:disabled{
  opacity:0.55;
  cursor:not-allowed;
}

.btn-dark{
  background:#222;
  color:white;
}

.badge{
  display:inline-block;
  padding:5px 8px;
  border:1px solid var(--green);
  color:var(--green);
  font-size:12px;
  margin-top:8px;
}

.badge-gold{
  border-color:var(--gold);
  color:var(--gold);
}

.warning{
  background:#1b1510;
  border:1px solid rgba(201,168,76,0.35);
  padding:15px;
  color:#ddd;
  margin-bottom:15px;
  line-height:1.5;
}

.meta-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.meta-item{
  color:#bbb;
  font-size:13px;
}

.meta-item strong{
  color:var(--muted);
  font-weight:500;
}

@media(max-width:600px){
  header{
    padding:18px;
    display:block;
  }

  .header-actions{
    margin-top:12px;
  }

  .wrapper{
    padding:18px;
  }

  .message{
    max-width:100%;
  }

  .meta-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">A<span>&</span>A Chat</div>

  <div class="header-actions">
    <button class="btn-dark" onclick="goRoom()">Room</button>
    <button class="btn-dark" onclick="goDashboard()">Dashboard</button>
    <button class="btn-dark" onclick="logout()">Logout</button>
  </div>
</header>

<div class="wrapper">

  <div id="warningBox"></div>

  <div class="deal-box">
    <h2 id="dealTitle">Private Deal Chat</h2>
    <div class="small" id="dealInfo">Loading deal information...</div>
    <span class="badge" id="dealStatus">Checking Access</span>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="small">Loading messages...</div>
  </div>

  <div class="input-box" id="inputBox">
    <textarea id="messageText" placeholder="Write your message..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">Send Message</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj1JKJIk9CvIIgwowusAMfDdDi5L9NY4k",
  authDomain: "aanda-web.firebaseapp.com",
  projectId: "aanda-web",
  storageBucket: "aanda-web.firebasestorage.app",
  messagingSenderId: "454700153826",
  appId: "1:454700153826:web:793107ea88e01d6eee97bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "aanda.b2bplatform@gmail.com";

const params = new URLSearchParams(window.location.search);
const offerId = params.get("offerId");

let currentUser = null;
let currentUserData = null;
let currentOffer = null;
let unsubscribeMessages = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (user.email === ADMIN_EMAIL) {
    window.location.href = "admin.html";
    return;
  }

  currentUser = user;

  if (!offerId) {
    lockChat("Offer ID was not found. Please return to the room and open the chat from an accepted offer.");
    return;
  }

  try {
    const companySnap = await getDoc(doc(db, "companies", user.uid));

    if (!companySnap.exists()) {
      window.location.href = "complete-profile.html";
      return;
    }

    currentUserData = companySnap.data();

    if (currentUserData.status !== "approved" || currentUserData.suspended) {
      alert("Your account must be approved before using private chat.");
      window.location.href = "dashboard.html";
      return;
    }

    await loadOffer();

  } catch (error) {
    lockChat("Access could not be verified. Please try again from your dashboard or industry room.");
  }
});

function safe(value){
  if(value === undefined || value === null || value === ""){
    return "-";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDate(value){
  if (!value) {
    return "-";
  }

  try {
    if (value.toDate) {
      return value.toDate().toLocaleString();
    }

    if (value instanceof Date) {
      return value.toLocaleString();
    }

    return String(value);
  } catch (error) {
    return "-";
  }
}

function showWarning(text){
  document.getElementById("warningBox").innerHTML = `
    <div class="warning">${safe(text)}</div>
  `;
}

function lockChat(text){
  showWarning(text);

  document.getElementById("dealStatus").innerText = "Access Restricted";
  document.getElementById("dealStatus").className = "badge badge-gold";

  document.getElementById("chatBox").innerHTML = `
    <div class="empty small">Private chat is not available.</div>
  `;

  document.getElementById("inputBox").style.display = "none";
}

async function loadOffer(){
  try {
    const offerRef = doc(db, "offers", offerId);
    const offerSnap = await getDoc(offerRef);

    if (!offerSnap.exists()) {
      lockChat("This offer was not found.");
      return;
    }

    currentOffer = {
      id: offerSnap.id,
      ...offerSnap.data()
    };

    const isOwner = currentOffer.owner === currentUser.uid;
    const isBuyer = currentOffer.buyer === currentUser.uid;

    if (!isOwner && !isBuyer) {
      lockChat("You do not have permission to access this private chat.");
      return;
    }

    if (currentOffer.status !== "accepted") {
      lockChat("Private chat opens only after the offer is accepted.");
      return;
    }

    renderDealInfo();
    document.getElementById("inputBox").style.display = "block";
    loadMessages();

  } catch (error) {
    lockChat("This private chat could not be opened. Please make sure the offer is accepted and belongs to your account.");
  }
}

function renderDealInfo(){
  document.getElementById("dealTitle").innerText =
    currentOffer.productName || "Private Deal Chat";

  document.getElementById("dealInfo").innerHTML = `
    <div class="meta-grid">
      <div class="meta-item"><strong>Product:</strong> ${safe(currentOffer.productName)}</div>
      <div class="meta-item"><strong>Offer Price:</strong> ${safe(currentOffer.price)}</div>
      <div class="meta-item"><strong>Buyer:</strong> ${safe(currentOffer.buyerCompany)} • ${safe(currentOffer.buyerCountry)}</div>
      <div class="meta-item"><strong>Buyer Role:</strong> ${safe(currentOffer.buyerRole)}</div>
      <div class="meta-item"><strong>Status:</strong> ${safe(currentOffer.status)}</div>
      <div class="meta-item"><strong>Room:</strong> ${safe(currentOffer.room)}</div>
    </div>
  `;

  document.getElementById("dealStatus").innerText = "Accepted Offer";
  document.getElementById("dealStatus").className = "badge";
}

window.sendMessage = async function(){
  if (!currentUser || !currentUserData || !currentOffer) {
    alert("Chat is not ready yet.");
    return;
  }

  if (currentOffer.status !== "accepted") {
    alert("This chat is not active.");
    return;
  }

  const isOwner = currentOffer.owner === currentUser.uid;
  const isBuyer = currentOffer.buyer === currentUser.uid;

  if (!isOwner && !isBuyer) {
    alert("You do not have permission to send messages in this chat.");
    return;
  }

  const text = document.getElementById("messageText").value.trim();

  if (!text) {
    alert("Please write a message.");
    return;
  }

  const sendBtn = document.getElementById("sendBtn");
  sendBtn.disabled = true;
  sendBtn.innerText = "Sending...";

  try {
    await addDoc(collection(db, "privateMessages"), {
      offerId: offerId,
      sender: currentUser.uid,
      senderEmail: currentUser.email,
      senderCompany: currentUserData.company || "",
      senderRole: currentUserData.role || "",
      text: text,
      createdAt: new Date()
    });

    document.getElementById("messageText").value = "";

  } catch (error) {
    alert("Error: " + error.message);
  }

  sendBtn.disabled = false;
  sendBtn.innerText = "Send Message";
};

function loadMessages(){
  const q = query(
    collection(db, "privateMessages"),
    where("offerId", "==", offerId)
  );

  if (unsubscribeMessages) {
    unsubscribeMessages();
  }

  unsubscribeMessages = onSnapshot(q, (snapshot) => {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    if (snapshot.empty) {
      chatBox.innerHTML = `
        <div class="small">No messages yet. Start the conversation.</div>
      `;
      return;
    }

    let messages = [];

    snapshot.forEach((docItem) => {
      messages.push({
        id: docItem.id,
        ...docItem.data()
      });
    });

    messages.sort((a, b) => {
      const aTime = a.createdAt?.seconds || 0;
      const bTime = b.createdAt?.seconds || 0;
      return aTime - bTime;
    });

    messages.forEach((msg) => {
      const mine = msg.sender === currentUser.uid;

      chatBox.innerHTML += `
        <div class="message ${mine ? "mine" : "partner"}">
          <div class="message-text">${safe(msg.text)}</div>
          <div class="message-meta">
            ${mine ? "You" : safe(msg.senderCompany)} • ${safe(msg.senderRole)} • ${safe(formatDate(msg.createdAt))}
          </div>
        </div>
      `;
    });

    chatBox.scrollTop = chatBox.scrollHeight;

  }, (error) => {
    lockChat("Messages could not be loaded. Please check your access to this accepted offer.");
  });
}

window.goRoom = function(){
  window.location.href = "room.html";
};

window.goDashboard = function(){
  window.location.href = "dashboard.html";
};

window.logout = function(){
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

</script>

</body>
</html>
